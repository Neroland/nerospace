modLoader = "javafml"
loaderVersion = "${forge_loader_version_range}"
license = "${mod_license}"
logoFile = "nerospace_logo.png"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''
Nerospace - multiloader build (Forge).
'''

[[mixins]]
config = "nerospace-common.mixins.json"

[[dependencies.${mod_id}]]
modId = "forge"
mandatory = true
versionRange = "${forge_loader_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Neroland Core — required shared foundation; must load BEFORE Nerospace (ordering = AFTER).
[[dependencies.${mod_id}]]
modId = "nerolandcore"
mandatory = true
versionRange = "[1.0,2.0)"
ordering = "AFTER"
side = "BOTH"
