# The multiloader build runs on its OWN Gradle, independent of the repo root
# (which stays on 9.2.1 for NeoForge/ModDevGradle). Architectury Loom 1.17.x
# calls Configuration.extendsFrom(Provider...), added in Gradle 9.4.0, so this
# build requires Gradle >= 9.4. Pinned to the current 9.5.1.
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-9.5.1-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
