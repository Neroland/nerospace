plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev' version '2.0.141'
    id 'idea'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    // Add here additional repositories if required by some of the dependencies below.
    mavenCentral() // ECJ (the Eclipse/IDE analyzer) for the ecjCheck verification task
    maven {
        name = 'BlameJared' // JEI
        url = 'https://maven.blamejared.com'
        content {
            includeGroup 'mezz.jei'
        }
    }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 25 to end users in 26.1.2, so mods should target Java 25.
java.toolchain.languageVersion = JavaLanguageVersion.of(25)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            clientData()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Stop ModDevGradle from (re)generating .vscode/launch.json with absolute,
            // machine-specific paths on every Gradle sync. The committed generic
            // launch.json (${workspaceFolder} + preLaunchTask) is the source of truth.
            disableIdeRun()

            // Telemetry self-test (PRIVACY.md): `gradlew runClient -PtelemetryTest=true`
            // sends one synthetic Sentry event on config load. Off by default.
            systemProperty 'nerospace.telemetry.test', providers.gradleProperty('telemetryTest').getOrElse('false')

            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    // Optional mod dependency: JEI (compat/jei plugin, loaded only when JEI is installed).
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    compileOnly "mezz.jei:jei-${minecraft_version}-common-api:${jei_version}"
    compileOnly "mezz.jei:jei-${minecraft_version}-neoforge-api:${jei_version}"
    // We add the full version to localRuntime, not runtimeOnly, so that we do not publish a dependency on it
    localRuntime "mezz.jei:jei-${minecraft_version}-neoforge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html

    // Sentry error-reporting SDK (telemetry/NerospaceTelemetry). Embedded in the mod jar
    // via NeoForge JarJar so players need no extra download; JarJar also dedupes if another
    // mod ships Sentry. The core 'sentry' artifact is dependency-free. Privacy rules
    // (opt-out config, nerospace-only filter, PII scrubbing) live in PRIVACY.md.
    jarJar(implementation('io.sentry:sentry')) {
        version {
            strictly '[8.0.0,9.0.0)'
            prefer '8.42.0'
        }
    }
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            jei_version            : jei_version,
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Regenerate the IDE run-argument files (build/moddev/*RunProgramArgs.txt, consumed by the generated
// .vscode/launch.json and IntelliJ run configs) on EVERY Gradle/IDE sync. ModDevGradle does not do
// this by default, so after a `neo_version` bump the launch configs keep passing the OLD --version
// (e.g. the IDE still launches 26.1.2.68 though gradle.properties says .70) until a run is manually
// triggered. Wiring the prepare tasks into the sync keeps the launchers pinned to the version in
// gradle.properties. (The runtime classpath is refreshed separately by the Java extension, since
// .vscode/settings.json sets java.configuration.updateBuildConfiguration = automatic.)
['prepareClientRun', 'prepareServerRun', 'prepareGameTestServerRun', 'prepareDataRun'].each { runArgTask ->
    neoForge.ideSyncTask tasks.named(runArgTask)
}

// `gradlew clean` deletes build/moddev/*RunVmArgs.txt, so launching a saved IDE run config straight
// after a clean fails ("could not open ...RunVmArgs.txt"). Regenerate them as a finalizer of clean so
// they are ALWAYS present after a clean/build — independent of whether the IDE keeps the preLaunchTask.
tasks.named('clean') {
    finalizedBy('prepareClientRun', 'prepareServerRun', 'prepareGameTestServerRun', 'prepareDataRun')
}

// ---------------------------------------------------------------------------
// Bulletproof IDE launch classpath (pathing jars).
//
// VS Code's Java extension assembles each launch's classpath from its OWN project
// model, which goes stale after a `neo_version` bump until a manual "Clean Java
// Language Server Workspace" — the symptom being FML booting the OLD neoforge jar and
// crashing with `NullPointerException: ... "version" is null` (the dev classpath no
// longer carries the patched Minecraft, so version detection returns null). The
// prepare<Run> tasks already pin the launch `--version`, but the CLASSPATH was left to
// the IDE. To make launches immune, emit the EXACT classpath ModDevGradle uses for each
// run as a single "pathing jar" (a jar whose MANIFEST `Class-Path` lists every run jar,
// as absolute file: URIs) and point .vscode/launch.json at it via `classPaths` instead
// of the IDE-derived `projectName` classpath. All dev run types (client/server/data/
// gameTestServer) share the same dev classpath — the patched Minecraft, NeoForge, DevLaunch
// and the MC libraries from `runtimeClasspath` — so one shared pathing jar serves them all
// (run type + `--version` come from the prepare<Run> argfiles; the mod itself loads via
// -Dfml.modFolders). The mod's own output is excluded so it is never double-loaded. The jar
// is rebuilt by every prepare<Run> preLaunchTask, on Gradle/IDE sync, and after `clean`, so
// it always matches gradle.properties — a `neo_version` bump can no longer leave a launch on
// a stale classpath. MDG's RunGameTask populates its own `classpath` only in an execution-time
// doFirst (unreadable here), so we source the equivalent set from `runtimeClasspath`.
def modOutputDirs = sourceSets.main.output.files
def devLaunchPathingJar = tasks.register('devLaunchPathingJar', Jar) {
    notCompatibleWithConfigurationCache('resolves the runtime classpath at execution time')
    archiveFileName = 'devlaunchClasspath.jar'
    destinationDirectory = layout.buildDirectory.dir('moddev')
    // Always regenerate: the manifest is computed from runtimeClasspath at execution and is NOT a
    // declared task input, so without this Gradle would cache the jar UP-TO-DATE and a later
    // neo_version bump would leave a stale classpath — the exact bug this jar exists to prevent. The
    // jar is manifest-only (sub-second), so unconditional rebuilds are free.
    outputs.upToDateWhen { false }
    manifest {
        attributes('Class-Path': provider {
            sourceSets.main.runtimeClasspath.files
                    .findAll { it.exists() && !(it in modOutputDirs) }
                    .collect { it.toURI().toString() }
                    .join(' ')
        })
    }
}
['prepareClientRun', 'prepareServerRun', 'prepareGameTestServerRun', 'prepareDataRun'].each { p ->
    tasks.named(p) { finalizedBy devLaunchPathingJar }
}
neoForge.ideSyncTask devLaunchPathingJar
tasks.named('clean') { finalizedBy devLaunchPathingJar }

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
    // Keep the codebase warning-free: full lint, with intentional idioms suppressed at the source.
    options.compilerArgs << '-Xlint:all' << '-Xlint:-processing'
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

// Bidirectional Blockbench <-> Java entity-model sync (tools/model_sync.py).
// Runs before compilation so editing a .bbmodel (or the marked Java cube block) and building
// keeps both sides converged. Direction is chosen by file mtime; override with
// `-PmodelSyncArgs=--to-java` (or --to-bbmodel, --check). The Python command is auto-detected
// (python3 / python / py); override with `-PpythonCmd=...`. Remove the compileJava dependency to opt out.
tasks.register('syncModels') {
    // Capture at configuration time so the doLast closure stays configuration-cache safe.
    def projDir = projectDir
    def syncArgs = providers.gradleProperty('modelSyncArgs').getOrElse('')
    def pythonOverride = providers.gradleProperty('pythonCmd').getOrNull()
    def isWindows = System.getProperty('os.name').toLowerCase().contains('win')
    def pyenvRoot = System.getenv('PYENV_ROOT') ?: System.getenv('PYENV')
    if (!pyenvRoot && System.getenv('USERPROFILE')) {
        pyenvRoot = System.getenv('USERPROFILE') + '\\.pyenv\\pyenv-win'
    }
    if (!pyenvRoot && System.getenv('HOME')) {
        pyenvRoot = System.getenv('HOME') + '/.pyenv'
    }
    def extra = (providers.gradleProperty('modelSyncArgs').getOrElse('')).split(' ').findAll { it } as List
    doLast {
        // .bat shims (pyenv-win) must go through cmd; resolve via cmd on Windows generally.
        def wrap = { c -> isWindows ? (['cmd', '/c'] + c) : c }
        def candidates = []
        if (pythonOverride) candidates << [pythonOverride]
        candidates += [['python'], ['py'], ['python3']]
        if (pyenvRoot) {
            def r = pyenvRoot.replaceAll(/[\\\/]+$/, '')
            candidates << [r + (isWindows ? '\\shims\\python.bat' : '/shims/python')]
            candidates << [r + (isWindows ? '\\bin\\python.exe' : '/bin/python')]
        }
        def python = null
        for (c in candidates) {
            try {
                def probe = wrap(c + ['--version']).execute(null, projDir)
                def o = new StringBuilder(); def e = new StringBuilder()
                probe.consumeProcessOutput(o, e); probe.waitFor()
                if (probe.exitValue() == 0) { python = c; break }
            } catch (ignored) {}
        }
        if (python == null) {
            throw new GradleException(
                "model_sync: no Python found (tried ${candidates}); set -PpythonCmd=<path>. " +
                "Detected pyenv root: ${pyenvRoot}")
        }
        def proc = wrap(python + ['tools/model_sync.py'] + extra).execute(null, projDir)
        def out = new StringBuilder(); def err = new StringBuilder()
        proc.consumeProcessOutput(out, err)
        proc.waitFor()
        if (out.length() > 0) println out.toString().trim()
        if (proc.exitValue() != 0) {
            throw new GradleException("model_sync failed (exit ${proc.exitValue()}):\n${err}")
        }
    }
}
tasks.named('compileJava') { dependsOn 'syncModels' }

// ---------------------------------------------------------------------------
// ecjCheck: run the Eclipse compiler (the SAME analyzer VS Code's Java
// extension uses) over the main sources, with tools/ecj.prefs mirroring the
// IDE's diagnostic settings. This surfaces Problems-panel warnings (null
// analysis, unused members, unnecessary suppressions, ...) from the command
// line / gradle MCP, so they can be fixed without screenshots.
// Warnings are reported in the log; the task only FAILS on real errors.
configurations {
    ecj
}
dependencies {
    ecj 'org.eclipse.jdt:ecj:+'
}
tasks.register('ecjCheck', JavaExec) {
    group = 'verification'
    description = 'Run the Eclipse (IDE) analyzer over main sources and report its diagnostics.'
    notCompatibleWithConfigurationCache('assembles the analysis classpath at execution time')
    dependsOn tasks.named('compileJava') // ensures the NeoForge artifacts exist
    classpath = configurations.ecj
    mainClass = 'org.eclipse.jdt.internal.compiler.batch.Main'
    doFirst {
        def analysisCp = (sourceSets.main.compileClasspath.files + sourceSets.main.output.files)
                .findAll { it.exists() }
                .join(File.pathSeparator)
        args = [
                '--release', java.toolchain.languageVersion.get().asInt().toString(),
                '-proc:none',
                '-d', 'none',
                '-properties', file('tools/ecj.prefs').absolutePath,
                '-classpath', analysisCp,
                file('src/main/java').absolutePath,
        ]
    }
}

// Regenerate procedural textures + Blockbench .bbmodel sources (additive: skips existing assets).
// Run on demand: `gradlew genAssets`. Python auto-detected (pyenv-aware), override with -PpythonCmd=.
tasks.register('genAssets') {
    def projDir = projectDir
    def pythonOverride = providers.gradleProperty('pythonCmd').getOrNull()
    def isWindows = System.getProperty('os.name').toLowerCase().contains('win')
    def pyenvRoot = System.getenv('PYENV_ROOT') ?: System.getenv('PYENV')
    if (!pyenvRoot && System.getenv('USERPROFILE')) {
        pyenvRoot = System.getenv('USERPROFILE') + '\\.pyenv\\pyenv-win'
    }
    doLast {
        def wrap = { c -> isWindows ? (['cmd', '/c'] + c) : c }
        def candidates = []
        if (pythonOverride) candidates << [pythonOverride]
        candidates += [['python'], ['py'], ['python3']]
        if (pyenvRoot) {
            def r = pyenvRoot.replaceAll(/[\\\/]+$/, '')
            candidates << [r + (isWindows ? '\\shims\\python.bat' : '/shims/python')]
        }
        def python = null
        for (c in candidates) {
            try {
                def probe = wrap(c + ['--version']).execute(null, projDir)
                probe.consumeProcessOutput(new StringBuilder(), new StringBuilder()); probe.waitFor()
                if (probe.exitValue() == 0) { python = c; break }
            } catch (ignored) {}
        }
        if (python == null) {
            throw new GradleException("genAssets: no Python found; set -PpythonCmd=<path>. pyenv root: ${pyenvRoot}")
        }
        ['tools/gen_textures.py', 'tools/gen_bbmodels.py'].each { script ->
            def proc = wrap(python + [script]).execute(null, projDir)
            def out = new StringBuilder(); def err = new StringBuilder()
            proc.consumeProcessOutput(out, err); proc.waitFor()
            if (out.length() > 0) println out.toString().trim()
            if (proc.exitValue() != 0) {
                throw new GradleException("${script} failed (exit ${proc.exitValue()}):\n${err}")
            }
        }
    }
}



