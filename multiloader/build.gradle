// =====================================================================
// Nerospace multiloader scaffold — ROOT build
// Loader axis via Architectury. Shared config for all sub-modules.
//
// Plugin versions are pinned here (the plugins {} block cannot read
// gradle.properties). Keep them in sync with the *_version values in
// gradle.properties.
// =====================================================================
plugins {
    id 'architectury-plugin' version '3.4-SNAPSHOT'
    // architectury-loom 1.17.x (current line; needs Gradle >= 9.4, hence this
    // build's own 9.5.1 wrapper). NOTE: 1.17.x does NOT yet support
    // de-obfuscated Minecraft 26.x — see the README "Troubleshooting" for the
    // three mappings configs tested, all of which fail. Bump this when
    // architectury-loom ships de-obf 26.x support. Keep in sync with
    // architectury_loom_version in gradle.properties.
    id 'dev.architectury.loom' version '1.17.483' apply false
}

architectury {
    minecraft = project.minecraft_version
}

allprojects {
    group = rootProject.mod_group_id
    version = rootProject.mod_version
}

subprojects {
    apply plugin: 'dev.architectury.loom'
    apply plugin: 'architectury-plugin'

    base {
        // produces e.g. nerospace-fabric-1.0.0-alpha.1.jar
        archivesName = "${rootProject.mod_id}-${project.name}"
    }

    repositories {
        mavenCentral()
        maven { url 'https://maven.fabricmc.net/' }
        maven { url 'https://maven.architectury.dev/' }
        maven { url 'https://maven.neoforged.net/releases/' }
        maven {
            name 'JEI'
            url 'https://maven.blamejared.com/'
        }
    }

    dependencies {
        minecraft "com.mojang:minecraft:${rootProject.minecraft_version}"
        // Minecraft 26.x is DE-OBFUSCATED (official names, no proguard mappings /
        // Intermediary). Fabric's OWN loom supports this by OMITTING `mappings`,
        // but architectury-loom 1.17.x does not yet — every option fails:
        //   * (omitted)                    -> "Configuration 'mappings' has no dependencies"
        //   * loom.officialMojangMappings() -> "Failed to find official mojang mappings"
        //   * loom.layered {}               -> NPE: srcNamespace is null
        // Left as the conventional line; this whole module is blocked until
        // architectury-loom adds de-obf 26.x support. See README "Troubleshooting".
        mappings loom.officialMojangMappings()
    }

    java {
        withSourcesJar()
        // Project targets Java 25 (see root CLAUDE.md).
        toolchain.languageVersion = JavaLanguageVersion.of(25)
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.release = 25
    }

    tasks.withType(ProcessResources).configureEach {
        // Range tracks the active version unless one is passed explicitly,
        // so a -Pminecraft_version=26.2 build emits "[26.2,)".
        def mcRange = project.findProperty('minecraft_version_range')
                ?: "[${rootProject.minecraft_version},)"
        def expand = [
            mod_id               : rootProject.mod_id,
            mod_name             : rootProject.mod_name,
            mod_version          : rootProject.mod_version,
            mod_license          : rootProject.mod_license,
            mod_authors          : rootProject.mod_authors,
            mod_group_id         : rootProject.mod_group_id,
            minecraft_version    : rootProject.minecraft_version,
            minecraft_version_range: mcRange,
            fabric_loader_version: rootProject.fabric_loader_version,
        ]
        inputs.properties(expand)
        filesMatching(['fabric.mod.json', 'META-INF/neoforge.mods.toml', 'pack.mcmeta']) {
            expand(expand)
        }
    }
}
