name: Multiloader Build

# Builds the multiloader scaffold (multiloader/) across the loader x Minecraft
# version matrix. Independent of the root single-loader build (build.yml).
#
# Layout: MultiLoader-Template (ModDevGradle common+neoforge, Fabric Loom fabric)
# — no architectury-loom (it can't do de-obf 26.x). fabric @ 26.2 is verified
# green (Fabric Loom 1.17 + fabric-api 0.152.1+26.2, NeoForm 26.2-1). The
# remaining combos stay `experimental: true` until their pins are confirmed /
# NeoForge 26.2 userdev resolves (beta on Maven, or self-built to mavenLocal —
# see multiloader/README.md). Flip a combo's `experimental` to false once green.

on:
  push:
    paths:
      - "multiloader/**"
      - ".github/workflows/multiloader.yml"
  pull_request:
    paths:
      - "multiloader/**"
      - ".github/workflows/multiloader.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.loader }} @ MC ${{ matrix.mc }}
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - loader: neoforge
            mc: "26.1.2"
            experimental: true   # ModDevGradle + NeoForge 26.1.2.76 (verify in CI, then flip)
          - loader: fabric
            mc: "26.1.2"
            experimental: true   # confirm fabric_api_version_26.1.2 at fabricmc.net/develop
          - loader: neoforge
            mc: "26.2"
            experimental: true   # needs NeoForge 26.2 userdev (beta on Maven or self-built)
          - loader: fabric
            mc: "26.2"
            experimental: false  # VERIFIED green 2026-06-18 (Fabric Loom 1.17 + fabric-api 0.152.1+26.2)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # The multiloader build uses its OWN Gradle wrapper (9.5.1), independent of
      # the repo root's 9.2.1 — Fabric Loom 1.17 requires Gradle >= 9.4.
      - name: Make Gradle wrapper executable
        run: chmod +x ./multiloader/gradlew

      - name: Build ${{ matrix.loader }} for MC ${{ matrix.mc }}
        working-directory: multiloader
        run: >-
          ./gradlew :${{ matrix.loader }}:build
          -Pminecraft_version=${{ matrix.mc }}
          --stacktrace

      - name: Upload ${{ matrix.loader }} ${{ matrix.mc }} jars
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nerospace-${{ matrix.loader }}-${{ matrix.mc }}
          path: multiloader/${{ matrix.loader }}/build/libs/*.jar
          if-no-files-found: ignore
