name: Multiloader Build

# Builds the multiloader scaffold (multiloader/) — MultiLoader-Template layout
# (ModDevGradle common+neoforge, Fabric Loom fabric; no architectury-loom).
# Independent of the root single-loader build (build.yml).
#
# STRICT: there is no continue-on-error, so ANY matrix cell that fails to build
# fails the whole workflow. The matrix therefore lists ONLY cells that are
# expected to build on a clean runner (both verified green via the gradle MCP on
# 2026-06-18). Cells that can't build on CI yet are listed (commented) below with
# the reason — re-add them here once they're unblocked.

on:
  push:
    paths:
      - "multiloader/**"
      - ".github/workflows/multiloader.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.loader }} @ MC ${{ matrix.mc }}
    runs-on: ubuntu-latest
    # No continue-on-error: any failed cell fails the workflow.
    strategy:
      fail-fast: false # still run every cell so one failure doesn't mask others
      matrix:
        include:
          - loader: neoforge
            mc: "26.1.2" # ModDevGradle + NeoForge 26.1.2.76 — verified green
          - loader: fabric
            mc: "26.2" # Fabric Loom 1.17 + fabric-api 0.152.1+26.2 (de-obf, no mappings) — verified green
          # PENDING — not buildable on a clean CI runner; re-add when unblocked:
          #   - { loader: fabric,   mc: "26.1.2" }  # Fabric never shipped MC 26.1.2 (26.1 -> 26.1.1 -> 26.2)
          #   - { loader: neoforge, mc: "26.2"  }   # needs NeoForge 26.2 userdev on Maven (or self-built to mavenLocal — see multiloader/README.md)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # The multiloader build uses its OWN Gradle wrapper (9.5.1), independent of
      # the repo root's 9.2.1 — Fabric Loom 1.17 requires Gradle >= 9.4.
      - name: Make Gradle wrapper executable
        run: chmod +x ./multiloader/gradlew

      - name: Build ${{ matrix.loader }} for MC ${{ matrix.mc }}
        working-directory: multiloader
        run: >-
          ./gradlew :${{ matrix.loader }}:build
          -Pminecraft_version=${{ matrix.mc }}
          --stacktrace

      - name: Upload ${{ matrix.loader }} ${{ matrix.mc }} jars
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: nerospace-${{ matrix.loader }}-${{ matrix.mc }}
          path: multiloader/${{ matrix.loader }}/build/libs/*.jar
          if-no-files-found: ignore
