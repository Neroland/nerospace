name: Auto-assign

# Automatically assigns dario-maselli to every newly opened issue and pull request.
#
# Uses pull_request_target (not pull_request) so PRs opened from forks are also
# handled: pull_request_target runs in the context of the BASE repo and gets a
# read/write token. This is safe here because the workflow never checks out or
# executes any code from the pull request — it only calls the issues API.
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  assign:
    runs-on: ubuntu-latest
    steps:
      - name: Assign dario-maselli
        uses: actions/github-script@v7
        with:
          script: |
            const assignee = 'dario-maselli';
            const issue_number = context.payload.issue?.number
              ?? context.payload.pull_request?.number;
            if (!issue_number) {
              core.info('No issue or pull request number in payload; nothing to assig