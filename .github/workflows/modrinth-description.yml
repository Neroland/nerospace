name: Sync Modrinth description

# Pushes art/modrinth_description.md to the Modrinth project page (the "body" field)
# whenever it changes on main — Modrinth's API supports writing descriptions, unlike
# CurseForge's (see RELEASE_RUNBOOK.md: the CurseForge description stays a manual paste).
#
# Requires repository secrets:
#   MODRINTH_PROJECT_ID — project id (or slug) of https://modrinth.com/mod/nerospace
#   MODRINTH_API_TOKEN  — a Modrinth PAT with the "Edit project details" scope
on:
  push:
    branches: [main, v1.0.0]
    paths:
      - art/modrinth_description.md
      - .github/workflows/modrinth-description.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Patch project body
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: PATCH the Modrinth project description
        env:
          MODRINTH_PROJECT_ID: ${{ secrets.MODRINTH_PROJECT_ID }}
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
        run: |
          if [ -z "$MODRINTH_PROJECT_ID" ] || [ -z "$MODRINTH_API_TOKEN" ]; then
            echo "::error::MODRINTH_PROJECT_ID / MODRINTH_API_TOKEN secret missing."
            exit 1
          fi

          # jq -Rs reads the whole file as one string and JSON-escapes it safely.
          jq -Rs '{body: .}' art/modrinth_description.md > payload.json

          HTTP_CODE=$(curl -sS -o response.txt -w "%{http_code}" \
            -X PATCH "https://api.modrinth.com/v2/project/${MODRINTH_PROJECT_ID}" \
            -H "Authorization: ${MODRINTH_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Neroland/nerospace-ci (dario@neroland.co.za)" \
            --data @payload.json)

          if [ "$HTTP_CODE" != "204" ]; then
            echo "::error::Modrinth API returned HTTP $HTTP_CODE"
            cat response.txt
            exit 1
          fi
          echo "Modrinth description synced (HTTP 204)."
