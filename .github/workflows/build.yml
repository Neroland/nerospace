name: Build (root single-loader — DISABLED)

# DISABLED 2026-06-22: the root single-loader mod is superseded by the multiloader
# (see multiloader.yml, which builds all 4 loader x MC cells). This workflow no longer
# runs on pull_request; it is kept manual-only (workflow_dispatch) in case the legacy
# root build ever needs a one-off check. Re-enable by restoring `pull_request` here.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # This is needed to be able to run ./gradlew below
      # You can run `git update-index --chmod +x gradlew` then remove this step.
      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build with Gradle
        run: ./gradlew build
