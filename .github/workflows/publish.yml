name: Publish

# Builds and publishes the MULTILOADER mod (all 6 cells: fabric/neoforge/forge x 26.1.2/26.2)
# whenever the mod_version in gradle.properties has no published release yet.
# The detect job checks for the release tag (v<mod_version>) that every publish creates —
# NOT the previous commit — so a version bumped two (or twenty) commits ago still publishes
# on the next push, and re-running the workflow is always safe (already-released versions
# are skipped by their tag). GitHub gets one release containing all six distributable
# jars; CurseForge/Modrinth get one upload per loader x MC cell so each file has exact
# loader and game-version metadata.
#
# Escape hatches: `workflow_dispatch` runs the same check manually (catches up a
# missed release without a dummy commit); if a publish half-failed AFTER its tag was
# created, delete the v<version> tag/release and re-run.
on:
  push:
    branches: [main, enhancement/multi-loader-support]
    paths:
      - gradle.properties
  workflow_dispatch:

# Allow the workflow to create GitHub Releases.
permissions:
  contents: write

jobs:
  detect:
    name: Detect unreleased version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Tags are the release ledger — fetch them all for the existence check.
          fetch-depth: 1
          fetch-tags: true

      - name: Check whether mod_version already has a release tag
        id: check
        run: |
          read_version() { grep -E '^mod_version=' "$1" | head -n1 | cut -d= -f2 | tr -d '[:space:]'; }

          CURRENT="$(read_version gradle.properties)"
          echo "current=$CURRENT"

          if [ -z "$CURRENT" ]; then
            echo "::error::Could not read mod_version from gradle.properties"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/v$CURRENT" >/dev/null; then
            echo "v$CURRENT is already released (tag exists); skipping."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "v$CURRENT has no release tag yet; publishing."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"

  publish:
    name: Build & publish
    needs: detect
    if: needs.detect.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      # Build all six cells (loader x MC version). Each produces a distinctly named
      # jar under <loader>/versions/<mc>/build/libs. Forge's distributable is the
      # jarJar output ("*-all.jar"); the plain Forge jar is not uploaded.
      - name: Build all cells
        run: >-
          ./gradlew
          :fabric:26.1.2:build :fabric:26.2:build
          :neoforge:26.1.2:build :neoforge:26.2:build
          :forge:26.1.2:build :forge:26.2:build
          --stacktrace

      # Derive the release channel from the version suffix once, for both Sentry and
      # the publish targets (NerospaceTelemetry derives its environment the same way:
      # -alpha -> alpha, -beta -> beta, else production; CurseForge release types map
      # to alpha/beta/release).
      # Privacy (POPIA/GDPR): this step logs only the version string - no personal data.
      - name: Determine release channel
        id: channel
        run: |
          case "${{ needs.detect.outputs.version }}" in
            *-alpha*) echo "environment=alpha"      >> "$GITHUB_OUTPUT"
                      echo "version_type=alpha"     >> "$GITHUB_OUTPUT" ;;
            *-beta*)  echo "environment=beta"       >> "$GITHUB_OUTPUT"
                      echo "version_type=beta"      >> "$GITHUB_OUTPUT" ;;
            *)        echo "environment=production" >> "$GITHUB_OUTPUT"
                      echo "version_type=release"   >> "$GITHUB_OUTPUT" ;;
          esac

      # Pull this version's section out of CHANGELOG.md (Keep-a-Changelog headings)
      # so the CurseForge file and the GitHub Release carry real release notes.
      - name: Extract changelog section
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          # Literal prefix match on the heading (no regex on the version string,
          # so dots in "1.0.0" can't act as wildcards).
          awk -v ver="$VERSION" '
            !found && index($0, "## [" ver "]") == 1 { found = 1; next }
            found && /^## \[/ { exit }
            found && /^\[[^]]+\]: / { next }  # skip link-definition lines
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::warning::No CHANGELOG.md section for $VERSION; using a placeholder."
            echo "See CHANGELOG.md for details." > RELEASE_NOTES.md
          fi
          cat RELEASE_NOTES.md

      # Register the release in Sentry so error reports group per mod version.
      # The release name must match what the SDK sends (NerospaceTelemetry:
      # release "nerospace@<mod_version>").
      # Requires repository secrets: SENTRY_AUTH_TOKEN, SENTRY_ORG, SENTRY_PROJECT.
      - name: Create Sentry release
        uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          release: nerospace@${{ needs.detect.outputs.version }}
          environment: ${{ steps.channel.outputs.environment }}

      - name: Publish GitHub Release assets
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: v${{ needs.detect.outputs.version }}
          name: Nerospace ${{ needs.detect.outputs.version }}
          version: ${{ needs.detect.outputs.version }}
          # alpha/beta/release, derived from the version suffix (1.0.0 -> release).
          version-type: ${{ steps.channel.outputs.version_type }}
          changelog-file: RELEASE_NOTES.md
          files: |
            fabric/versions/26.1.2/build/libs/nerospace-fabric-26.1.2-${{ needs.detect.outputs.version }}.jar
            fabric/versions/26.2/build/libs/nerospace-fabric-26.2-${{ needs.detect.outputs.version }}.jar
            neoforge/versions/26.1.2/build/libs/nerospace-neoforge-26.1.2-${{ needs.detect.outputs.version }}.jar
            neoforge/versions/26.2/build/libs/nerospace-neoforge-26.2-${{ needs.detect.outputs.version }}.jar
            forge/versions/26.1.2/build/libs/nerospace-forge-26.1.2-${{ needs.detect.outputs.version }}-all.jar
            forge/versions/26.2/build/libs/nerospace-forge-26.2-${{ needs.detect.outputs.version }}-all.jar
          java: 25

      - name: Publish Fabric 26.1.2 to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSE_FORGE_API_TOKEN }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          name: Nerospace ${{ needs.detect.outputs.version }} - Fabric 26.1.2
          version: ${{ needs.detect.outputs.version }}-fabric-26.1.2
          version-type: ${{ steps.channel.outputs.version_type }}
          changelog-file: RELEASE_NOTES.md
          files: fabric/versions/26.1.2/build/libs/nerospace-fabric-26.1.2-${{ needs.detect.outputs.version }}.jar
          loaders: fabric
          game-versions: 26.1.2
          java: 25

      - name: Publish Fabric 26.2 to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSE_FORGE_API_TOKEN }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          name: Nerospace ${{ needs.detect.outputs.version }} - Fabric 26.2
          version: ${{ needs.detect.outputs.version }}-fabric-26.2
          version-type: ${{ steps.channel.outputs.version_type }}
          changelog-file: RELEASE_NOTES.md
          files: fabric/versions/26.2/build/libs/nerospace-fabric-26.2-${{ needs.detect.outputs.version }}.jar
          loaders: fabric
          game-versions: 26.2
          java: 25

      - name: Publish NeoForge 26.1.2 to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSE_FORGE_API_TOKEN }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          name: Nerospace ${{ needs.detect.outputs.version }} - NeoForge 26.1.2
          version: ${{ needs.detect.outputs.version }}-neoforge-26.1.2
          version-type: ${{ steps.channel.outputs.version_type }}
          changelog-file: RELEASE_NOTES.md
          files: neoforge/versions/26.1.2/build/libs/nerospace-neoforge-26.1.2-${{ needs.detect.outputs.version }}.jar
          loaders: neoforge
          game-versions: 26.1.2
          java: 25

      - name: Publish NeoForge 26.2 to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSE_FORGE_API_TOKEN }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          name: Nerospace ${{ needs.detect.outputs.version }} - NeoForge 26.2
          version: ${{ needs.detect.outputs.version }}-neoforge-26.2
          version-type: ${{ steps.channel.outputs.version_type }}
          changelog-file: RELEASE_NOTES.md
          files: neoforge/versions/26.2/build/libs/nerospace-neoforge-26.2-${{ needs.detect.outputs.version }}.jar
          loaders: neoforge
          game-versions: 26.2
          java: 25

      - name: Publish Forge 26.1.2 to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSE_FORGE_API_TOKEN }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          name: Nerospace ${{ needs.detect.outputs.version }} - Forge 26.1.2
          version: ${{ needs.detect.outputs.version }}-forge-26.1.2
          version-type: ${{ steps.channel.outputs.version_type }}
          changelog-file: RELEASE_NOTES.md
          files: forge/versions/26.1.2/build/libs/nerospace-forge-26.1.2-${{ needs.detect.outputs.version }}-all.jar
          loaders: forge
          game-versions: 26.1.2
          java: 25

      - name: Publish Forge 26.2 to CurseForge and Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSE_FORGE_API_TOKEN }}
          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_API_TOKEN }}
          name: Nerospace ${{ needs.detect.outputs.version }} - Forge 26.2
          version: ${{ needs.detect.outputs.version }}-forge-26.2
          version-type: ${{ steps.channel.outputs.version_type }}
          changelog-file: RELEASE_NOTES.md
          files: forge/versions/26.2/build/libs/nerospace-forge-26.2-${{ needs.detect.outputs.version }}-all.jar
          loaders: forge
          game-versions: 26.2
          java: 25
