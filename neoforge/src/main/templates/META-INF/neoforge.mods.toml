modLoader = "javafml"
loaderVersion = "[1,)"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
description = '''
Nerospace - multiloader build (NeoForge).
'''

[[mixins]]
config = "nerospace-common.mixins.json"

[[dependencies.${mod_id}]]
modId = "neoforge"
type = "required"
versionRange = "[0,)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${mod_id}]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

# Neroland Core — required shared foundation; must load BEFORE Nerospace (ordering = AFTER).
[[dependencies.${mod_id}]]
modId = "nerolandcore"
type = "required"
versionRange = "${nerolandcore_version_range}"
ordering = "AFTER"
side = "BOTH"

# Energized Power — optional interop. When present it must load BEFORE Nerospace so its Forge-Energy
# capabilities and c: material tags are available; discovery is via Core tags/capabilities, never a
# hard import.
[[dependencies.${mod_id}]]
modId = "energizedpower"
type = "optional"
versionRange = "[0,)"
ordering = "AFTER"
side = "BOTH"
